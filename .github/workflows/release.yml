name: Release ElliGram

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;21.4.7075529" --sdk_root=$ANDROID_SDK_ROOT

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > elligram.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ARM64 Release
        run: ./gradlew :TMessagesProj_App:assembleArm64Release -PRELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} -PRELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }} -PRELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv TMessagesProj_App/build/outputs/apk/arm64/release/app.apk ElliGram-${{ steps.version.outputs.VERSION }}-arm64.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ElliGram ${{ steps.version.outputs.VERSION }}
          body: |
            ## ElliGram ${{ steps.version.outputs.VERSION }}

            ### Что нового
            _Описание изменений_

            ### Скачать
            - **ARM64** (Pixel, Samsung, большинство современных устройств)

            ### Установка
            1. Скачай APK
            2. Разреши установку из неизвестных источников
            3. Установи
          files: ElliGram-${{ steps.version.outputs.VERSION }}-arm64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
